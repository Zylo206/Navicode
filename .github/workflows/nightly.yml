name: Nightly

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-full:
    name: Java full regression
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run full Maven test suite
        run: mvn -B -ntp test -DskipTests=false

  wechat-bridge:
    name: WeChat bridge full check
    runs-on: windows-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: integrations/wechat-bridge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: integrations/wechat-bridge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run bridge tests
        run: npm test
